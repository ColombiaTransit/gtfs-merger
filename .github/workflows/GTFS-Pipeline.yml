name: GTFS-Pipeline

on:
  schedule:
    - cron: '0 3 * * 1'   # every Monday 03:00 UTC
  workflow_dispatch:
    inputs:
      skip_shapes:
        description: 'Skip shape generation'
        type: boolean
        default: true
      shape_method:
        description: 'Shape generation method'
        type: choice
        options: [straight, osrm]
        default: straight

env:
  FEEDS_DIR: tmp/feeds
  REPORTS_DIR: tmp/validation
  OUT_ZIP: tmp/merged.zip

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Optional: spin up OSRM when osrm method is selected
    # services:
    #   osrm:
    #     image: osrm/osrm-backend
    #     ports:
    #       - 5000:5000

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Download ────────────────────────────────────────────────────────────
      - name: Download feeds
        run: |
          python scripts/pipeline.py download \
            --config feeds.yml \
            --out ${{ env.FEEDS_DIR }}
        # env:
          # Add per-feed auth tokens here as needed:
          # FEED_A_TOKEN: ${{ secrets.FEED_A_TOKEN }}
          # FEED_B_TOKEN: ${{ secrets.FEED_B_TOKEN }}

      # ── Validate ────────────────────────────────────────────────────────────
      - name: Validate feeds
        id: validate
        run: |
          python scripts/pipeline.py validate \
            --input ${{ env.FEEDS_DIR }} \
            --report ${{ env.REPORTS_DIR }}
        continue-on-error: true   # bad feeds are logged & skipped, not fatal

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_id }}
          path: ${{ env.REPORTS_DIR }}/
          retention-days: 30

      # ── Shapes ──────────────────────────────────────────────────────────────
      - name: Generate missing shapes
        if: ${{ inputs.skip_shapes != true }}
        run: |
          python scripts/pipeline.py shapes \
            --input ${{ env.FEEDS_DIR }} \
            --method ${{ inputs.shape_method || 'straight' }} \
            --osrm-url http://localhost:5000

      # ── Normalize ───────────────────────────────────────────────────────────
      - name: Normalize IDs
        run: |
          python scripts/pipeline.py normalize \
            --input ${{ env.FEEDS_DIR }}

      # ── Merge ───────────────────────────────────────────────────────────────
      - name: Merge feeds
        run: |
          python scripts/pipeline.py merge \
            --input ${{ env.FEEDS_DIR }} \
            --out ${{ env.OUT_ZIP }}

      # ── Upload artifact ─────────────────────────────────────────────────────
      - name: Upload merged GTFS
        uses: actions/upload-artifact@v4
        with:
          name: merged-gtfs-${{ github.run_id }}
          path: ${{ env.OUT_ZIP }}
          retention-days: 90

      # ── Publish release (scheduled runs only) ───────────────────────────────
      - name: Create release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: gtfs-${{ github.run_number }}
          name: GTFS Merged Feed – run ${{ github.run_number }}
          body: |
            Automatically generated by the GTFS pipeline.
            - **Run:** ${{ github.run_number }}
            - **Triggered by:** schedule
            - **Shape method:** ${{ inputs.shape_method || 'straight' }}
          files: ${{ env.OUT_ZIP }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
